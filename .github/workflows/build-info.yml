name: Update build info
on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/version.json'
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Write version.json
        run: |
          echo "{\"date\":\"$(TZ='Europe/Moscow' date '+%d.%m.%Y %H:%M')\",\"sha\":\"${GITHUB_SHA:0:7}\"}" > docs/version.json
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/version.json
          git diff --staged --quiet || git commit -m "chore: update build info [skip ci]"
          git push
